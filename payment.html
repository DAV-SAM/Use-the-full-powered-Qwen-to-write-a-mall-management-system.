<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付订单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        .nav {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 40px;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 52px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #1d1d1f;
            text-decoration: none;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 40px;
        }

        .payment-box {
            background: #fff;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            text-align: center;
        }

        .payment-icon {
            width: 64px;
            height: 64px;
            background: #34c759;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
        }

        .payment-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1d1d1f;
        }

        .payment-subtitle {
            font-size: 16px;
            color: #86868b;
            margin-bottom: 40px;
        }

        .order-info {
            margin-bottom: 40px;
            text-align: left;
            padding: 28px;
            background: #f5f5f7;
            border-radius: 16px;
        }

        .order-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            font-size: 15px;
            color: #86868b;
        }

        .order-info-item:last-child {
            margin-bottom: 0;
        }

        .order-info-item.total {
            font-size: 22px;
            font-weight: 700;
            color: #1d1d1f;
            border-top: 1px solid #d2d2d7;
            padding-top: 16px;
            margin-top: 16px;
        }

        .qr-section {
            margin-bottom: 24px;
        }

        .qr-code {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .payment-tip {
            color: #86868b;
            font-size: 14px;
        }

        .back-link {
            display: inline-block;
            margin-top: 32px;
            color: #0071e3;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="shop.html" class="logo">Apple Shop</a>
        </div>
    </nav>

    <div class="container">
        <div class="payment-box">
            <div class="payment-icon">💚</div>
            <div class="payment-title">微信支付</div>
            <div class="payment-subtitle">请使用微信扫描二维码完成支付</div>

            <div class="order-info" id="orderInfo"></div>

            <div class="qr-section">
                <img class="qr-code" id="qrCode" alt="微信支付二维码">
            </div>

            <div class="payment-tip">订单将在支付确认后立即处理</div>

            <a href="shop.html" class="back-link">← 返回商城</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('productId');
        const quantity = urlParams.get('quantity');

        async function createOrder() {
            try {
                const response = await fetch('http://localhost:5000/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ productId, quantity, userId: localStorage.getItem('userId') || null })
                });

                const order = await response.json();

                document.getElementById('orderInfo').innerHTML = `
                    <div class="order-info-item">
                        <span>商品名称</span>
                        <span style="color: #1d1d1f; font-weight: 500;">${order.product}</span>
                    </div>
                    <div class="order-info-item">
                        <span>购买数量</span>
                        <span style="color: #1d1d1f; font-weight: 500;">${order.quantity}</span>
                    </div>
                    <div class="order-info-item">
                        <span>订单号</span>
                        <span style="color: #1d1d1f; font-weight: 500;">${order.orderId}</span>
                    </div>
                    <div class="order-info-item total">
                        <span>应付金额</span>
                        <span>¥${order.totalPrice.toLocaleString()}</span>
                    </div>
                `;

                document.getElementById('qrCode').src = order.qrCodeUrl;
            } catch (error) {
                console.error('创建订单失败:', error);
            }
        }

        createOrder();
    </script>
</body>
</html>
