<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        .nav {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 40px;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 52px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #1d1d1f;
            text-decoration: none;
        }

        .back-btn {
            color: #0071e3;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .product-detail {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 80px;
            align-items: start;
        }

        .product-image-large {
            background: #fff;
            border-radius: 24px;
            height: 560px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }

        .product-image-large::before {
            content: '';
            position: absolute;
            width: 240px;
            height: 300px;
            background: linear-gradient(135deg, #e8e8ed 0%, #d2d2d7 100%);
            border-radius: 32px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.5);
        }

        .product-image-large::after {
            content: '📱';
            position: relative;
            font-size: 100px;
            z-index: 2;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
        }

        .product-info-detail {
            padding-top: 20px;
        }

        .category-badge-large {
            font-size: 14px;
            font-weight: 600;
            color: #bf4800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
        }

        .product-name-large {
            font-size: 48px;
            font-weight: 700;
            color: #1d1d1f;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .product-price-large {
            font-size: 32px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 32px;
        }

        .product-description-large {
            font-size: 17px;
            color: #86868b;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .divider {
            height: 1px;
            background: #d2d2d7;
            margin: 32px 0;
        }

        .quantity-section {
            margin-bottom: 40px;
        }

        .quantity-label {
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 16px;
        }

        .quantity-selector {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            background: #fff;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .quantity-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f7;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            color: #1d1d1f;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quantity-btn:hover {
            background: #e8e8ed;
        }

        .quantity-input {
            width: 50px;
            height: 36px;
            text-align: center;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
            background: transparent;
        }

        .stock-info {
            color: #86868b;
            font-size: 14px;
            margin-top: 12px;
        }

        .btn-buy-now {
            width: 100%;
            background: #0071e3;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-buy-now:hover {
            background: #0077ed;
            transform: scale(1.02);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 80px;
        }

        .feature-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 16px;
        }

        .feature-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .feature-desc {
            font-size: 14px;
            color: #86868b;
        }

        @media (max-width: 768px) {
            .product-detail {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .product-name-large {
                font-size: 32px;
            }
            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="shop.html" class="logo">Apple Shop</a>
            <a href="shop.html" class="back-btn">← 返回商城</a>
        </div>
    </nav>

    <div class="container">
        <div class="product-detail" id="productDetail">
            <div class="product-image-large"></div>
            <div class="product-info-detail" id="productInfo"></div>
        </div>

        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">🚚</div>
                <div class="feature-title">免费送货</div>
                <div class="feature-desc">所有订单均可享受免费送货服务</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🔄</div>
                <div class="feature-title">14 天退换</div>
                <div class="feature-desc">不满意可随时退换货</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🛡️</div>
                <div class="feature-title">官方保修</div>
                <div class="feature-desc">享受一年官方保修服务</div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let quantity = 1;

        async function loadProduct() {
            try {
                const response = await fetch(`http://localhost:5000/products/${productId}`);
                const product = await response.json();

                document.getElementById('productInfo').innerHTML = `
                    <div class="category-badge-large">${product.category}</div>
                    <div class="product-name-large">${product.name}</div>
                    <div class="product-price-large">¥${product.price.toLocaleString()}</div>
                    <div class="product-description-large">${product.description}</div>
                    <div class="divider"></div>
                    <div class="quantity-section">
                        <div class="quantity-label">选择数量</div>
                        <div class="quantity-selector">
                            <button class="quantity-btn" onclick="changeQuantity(-1)">−</button>
                            <input type="number" class="quantity-input" id="quantity" value="1" min="1" max="${product.stock}" readonly>
                            <button class="quantity-btn" onclick="changeQuantity(1)">+</button>
                        </div>
                        <div class="stock-info">库存: ${product.stock} 件</div>
                    </div>
                    <button class="btn-buy-now" onclick="buyNow()">立即购买</button>
                `;
            } catch (error) {
                console.error('加载商品失败:', error);
            }
        }

        function changeQuantity(delta) {
            const input = document.getElementById('quantity');
            const newValue = parseInt(input.value) + delta;
            if (newValue >= 1 && newValue <= parseInt(input.max)) {
                input.value = newValue;
                quantity = newValue;
            }
        }

        function buyNow() {
            window.location.href = `payment.html?productId=${productId}&quantity=${quantity}`;
        }

        loadProduct();
    </script>
</body>
</html>
