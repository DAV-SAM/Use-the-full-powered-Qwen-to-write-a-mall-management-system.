<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        .nav {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 40px;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 52px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #1d1d1f;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            color: #1d1d1f;
            text-decoration: none;
            font-size: 13px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        .hero {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 120px 20px 140px;
            margin-bottom: 60px;
        }

        .hero h1 {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1.07;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 28px;
            font-weight: 400;
            color: #86868b;
            letter-spacing: 0.3px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .section-title {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 40px;
            color: #1d1d1f;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 24px;
            border-radius: 20px;
            border: 1px solid #d2d2d7;
            background: #fff;
            color: #1d1d1f;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .filter-btn:hover {
            background: #1d1d1f;
            color: #fff;
            border-color: #1d1d1f;
        }

        .filter-btn.active {
            background: #1d1d1f;
            color: #fff;
            border-color: #1d1d1f;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
            margin-bottom: 100px;
        }

        .product-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
        }

        .product-image {
            width: 100%;
            height: 320px;
            background: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 220px;
            background: linear-gradient(135deg, #e8e8ed 0%, #d2d2d7 100%);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.5);
        }

        .product-image::after {
            content: '📱';
            position: relative;
            font-size: 64px;
            z-index: 2;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
        }

        .product-info {
            padding: 28px 32px 32px;
        }

        .category-badge {
            font-size: 12px;
            font-weight: 600;
            color: #bf4800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1d1d1f;
            letter-spacing: -0.3px;
        }

        .product-description {
            font-size: 15px;
            color: #86868b;
            margin-bottom: 20px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .product-price span {
            font-size: 14px;
            color: #86868b;
            font-weight: 400;
        }

        .btn-buy {
            background: #0071e3;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-buy:hover {
            background: #0077ed;
            transform: scale(1.04);
        }

        .footer {
            background: #f5f5f7;
            border-top: 1px solid #d2d2d7;
            padding: 40px;
            text-align: center;
            color: #86868b;
            font-size: 12px;
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 40px;
            }
            .hero p {
                font-size: 20px;
            }
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="shop.html" class="logo">Apple Shop</a>
            <div class="nav-links">
                <a href="shop.html">商城</a>
                <a href="login.html">登录</a>
                <a href="register.html">注册</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <h1>新产品。</h1>
        <p>焕然一新。不同凡响。</p>
    </section>

    <div class="container">
        <h2 class="section-title">最新产品</h2>

        <div class="filters">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="手机">手机</button>
            <button class="filter-btn" data-category="笔记本">笔记本</button>
            <button class="filter-btn" data-category="平板">平板</button>
            <button class="filter-btn" data-category="耳机">耳机</button>
            <button class="filter-btn" data-category="智能手表">智能手表</button>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div class="footer">
        Apple Shop Demo. Designed with care.
    </div>

    <script>
        let allProducts = [];

        async function loadProducts() {
            try {
                const response = await fetch('http://localhost:5000/products');
                allProducts = await response.json();
                displayProducts(allProducts);
            } catch (error) {
                console.error('加载商品失败:', error);
            }
        }

        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card" onclick="location.href='product.html?id=${product.id}'">
                    <div class="product-image"></div>
                    <div class="product-info">
                        <div class="category-badge">${product.category}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-footer">
                            <div class="product-price">¥${product.price.toLocaleString()}</div>
                            <button class="btn-buy" onclick="event.stopPropagation(); buyProduct(${product.id})">购买</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function buyProduct(id) {
            window.location.href = `product.html?id=${id}`;
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const category = btn.dataset.category;
                if (category === 'all') {
                    displayProducts(allProducts);
                } else {
                    displayProducts(allProducts.filter(p => p.category === category));
                }
            });
        });

        loadProducts();
    </script>
</body>
</html>
